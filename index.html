<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《凡人修币录》创作档案库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid #00d4ff;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.1em;
            color: #888;
            margin-bottom: 10px;
        }
        
        .last-update {
            font-size: 0.9em;
            color: #666;
        }
        
        .section {
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
        }
        
        .section:last-child {
            border-bottom: none;
        }
        
        .section-title {
            font-size: 2em;
            margin-bottom: 25px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .section-icon {
            font-size: 2.5em;
        }
        
        .card-content {
            font-size: 1em;
            line-height: 1.9;
            color: #ccc;
        }
        
        .card-content h2 {
            font-size: 1.5em;
            color: #00d4ff;
            margin: 30px 0 20px 0;
            border-bottom: 1px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 10px;
        }
        
        .card-content h2:first-child {
            margin-top: 0;
        }
        
        .card-content h3 {
            font-size: 1.2em;
            color: #00d4ff;
            margin: 25px 0 15px 0;
        }
        
        .card-content ul, .card-content ol {
            margin: 15px 0 15px 25px;
        }
        
        .card-content li {
            margin: 10px 0;
            list-style-position: outside;
        }
        
        .card-content p {
            margin: 15px 0;
        }
        
        .card-content strong {
            color: #00d4ff;
        }
        
        .card-content code {
            background: rgba(0, 212, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: #00ffaa;
            font-family: 'Monaco', 'Menlo', monospace;
        }
        
        .stats {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-top: 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .stats-item {
            padding: 15px;
        }
        
        .stats-number {
            font-size: 2em;
            color: #00d4ff;
            font-weight: bold;
        }
        
        .stats-label {
            font-size: 0.9em;
            color: #888;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .section-title {
                font-size: 1.5em;
            }
            
            .section-icon {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 《凡人修币录》创作档案库</h1>
            <p class="subtitle">Datsby 的短剧创作空间 | 加密文化 × 人性叙事</p>
            <p class="last-update" id="lastUpdate">最后更新: 加载中...</p>
        </header>
        
        <div class="section">
            <div class="section-title">
                <span class="section-icon">📜</span>
                <span>剧本库</span>
            </div>
            <div class="card-content" id="scriptsContent">加载中...</div>
        </div>
        
        <div class="section">
            <div class="section-title">
                <span class="section-icon">👥</span>
                <span>人物库</span>
            </div>
            <div class="card-content" id="charactersContent">加载中...</div>
        </div>
        
        <div class="section">
            <div class="section-title">
                <span class="section-icon">💭</span>
                <span>创作思路</span>
            </div>
            <div class="card-content" id="narrativeContent">加载中...</div>
        </div>
        
        <div class="stats">
            <div class="stats-item">
                <div class="stats-number" id="projectCount">1</div>
                <div class="stats-label">进行中的项目</div>
            </div>
            <div class="stats-item">
                <div class="stats-number" id="charCount">0</div>
                <div class="stats-label">主要人物</div>
            </div>
            <div class="stats-item">
                <div class="stats-number" id="seasonCount">3+</div>
                <div class="stats-label">规划季数</div>
            </div>
        </div>
    </div>
    
    <script>
        // 简单的Markdown转HTML
        function markdownToHtml(text) {
            let html = text;
            
            // 处理标题
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            
            // 处理列表
            html = html.replace(/^\- (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\n<ul>/g, '');
            
            // 处理粗体 **text**
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // 处理代码 `code`
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            
            return html;
        }
        
        async function loadContent() {
            try {
                const content = {
                    scripts: `## 《凡人修币录》S2
- **创建日期:** 2026-03-19
- **状态:** 记录中
- **世界观梗概:** 加密文化与人性的碰撞
- **核心冲突:** 情绪收割与Builder精神的对抗
- **时长/集数:** 待定
- **其他备注:** 采用黑镜模式，每季独立故事`,
                    
                    characters: `## 《凡人修币录》S2

### 主要人物
- 待补充

### 人物关系图
- 待补充`,
                    
                    narrative: `## 《凡人修币录》S2

### 核心框架
**统一世界观主题：** 加密文化与人性
- S1：FUD与信仰
- S2：情绪收割与Builder精神
- S3：L1大Boss的真正面目
- Sn：每一季对应当下最真实的加密议题

### 创作思路
- 采用黑镜模式：统一世界观 + 每季独立故事 + 无限延伸潜力

### 与黑镜的对标分析
**黑镜：** 观众是被动消费者

**《凡人修币录》：** 观众可以成为共创者
- 共创者身份
- 贡献者身份
- 早期持有者身份
- 观众与IP的关系从"消费"变成"共建"

### 核心竞争力
为什么比黑镜更有潜力：观众的身份不是消费者，而是参与者和利益相关方`
                };
                
                document.getElementById('scriptsContent').innerHTML = markdownToHtml(content.scripts);
                document.getElementById('charactersContent').innerHTML = markdownToHtml(content.characters);
                document.getElementById('narrativeContent').innerHTML = markdownToHtml(content.narrative);
                
                const now = new Date();
                const timeStr = now.toLocaleString('zh-CN', { 
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
                
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
