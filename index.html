<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《凡人修币录》创作档案库</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: #f0f7f0;
            color: #2c2c2c;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
            border-bottom: 2px solid #4a7c59;
            padding-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #2c2c2c;
        }
        
        .subtitle {
            font-size: 1.1em;
            color: #6b6b6b;
            margin-bottom: 10px;
        }
        
        .last-update {
            font-size: 0.9em;
            color: #999;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #4a7c59;
        }
        
        .tab-button {
            background: none;
            border: none;
            font-size: 1.2em;
            padding: 15px 25px;
            cursor: pointer;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        .tab-button:hover {
            color: #4a7c59;
        }
        
        .tab-button.active {
            color: #4a7c59;
            border-bottom-color: #4a7c59;
        }
        
        .page-container {
            display: none;
            animation: pageTransition 0.5s ease-in-out;
        }
        
        .page-container.active {
            display: block;
        }
        
        @keyframes pageTransition {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .content-card {
            background: #f8faf8;
            border: 1px solid #d4e5d4;
            border-radius: 8px;
            padding: 40px;
            min-height: 500px;
        }
        
        .card-content {
            font-size: 1em;
            line-height: 1.9;
            color: #333;
        }
        
        .card-content h2 {
            font-size: 1.5em;
            color: #2c2c2c;
            margin: 30px 0 20px 0;
            border-bottom: 1px solid #d4e5d4;
            padding-bottom: 10px;
            font-weight: 600;
        }
        
        .card-content h2:first-child {
            margin-top: 0;
        }
        
        .card-content h3 {
            font-size: 1.2em;
            color: #2c2c2c;
            margin: 25px 0 15px 0;
            font-weight: 600;
        }
        
        .card-content ul, .card-content ol {
            margin: 15px 0 15px 25px;
        }
        
        .card-content li {
            margin: 10px 0;
            list-style-position: outside;
        }
        
        .card-content p {
            margin: 15px 0;
        }
        
        .card-content strong {
            color: #2c2c2c;
            font-weight: 600;
        }
        
        .card-content code {
            background: #e8f5e9;
            padding: 2px 6px;
            border-radius: 4px;
            color: #4a7c59;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.95em;
        }
        
        .stats {
            background: #f8faf8;
            border: 1px solid #d4e5d4;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
        }
        
        .stats-item {
            padding: 15px;
        }
        
        .stats-number {
            font-size: 2em;
            color: #4a7c59;
            font-weight: bold;
        }
        
        .stats-label {
            font-size: 0.9em;
            color: #6b6b6b;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }
            
            .tabs {
                flex-wrap: wrap;
            }
            
            .tab-button {
                font-size: 1em;
                padding: 10px 15px;
            }
            
            .content-card {
                padding: 20px;
                min-height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 《凡人修币录》创作档案库</h1>
            <p class="subtitle">Datsby 的短剧创作空间 | 加密文化 × 人性叙事</p>
            <p class="last-update" id="lastUpdate">最后更新: 加载中...</p>
        </header>
        
        <div class="tabs">
            <button class="tab-button active" data-tab="scripts" onclick="switchTab('scripts')">📜 剧本库</button>
            <button class="tab-button" data-tab="characters" onclick="switchTab('characters')">👥 人物库</button>
            <button class="tab-button" data-tab="narrative" onclick="switchTab('narrative')">💭 创作思路</button>
        </div>
        
        <div id="scripts" class="page-container active">
            <div class="content-card">
                <div class="card-content" id="scriptsContent">加载中...</div>
            </div>
            <div class="stats">
                <div class="stats-item">
                    <div class="stats-number">1</div>
                    <div class="stats-label">进行中的项目</div>
                </div>
                <div class="stats-item">
                    <div class="stats-number">3+</div>
                    <div class="stats-label">规划季数</div>
                </div>
            </div>
        </div>
        
        <div id="characters" class="page-container">
            <div class="content-card">
                <div class="card-content" id="charactersContent">加载中...</div>
            </div>
            <div class="stats">
                <div class="stats-item">
                    <div class="stats-number">0</div>
                    <div class="stats-label">主要人物</div>
                </div>
            </div>
        </div>
        
        <div id="narrative" class="page-container">
            <div class="content-card">
                <div class="card-content" id="narrativeContent">加载中...</div>
            </div>
            <div class="stats">
                <div class="stats-item">
                    <div class="stats-number">3+</div>
                    <div class="stats-label">规划季数</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function switchTab(tabName) {
            // 隐藏所有页面
            document.querySelectorAll('.page-container').forEach(page => {
                page.classList.remove('active');
            });
            
            // 移除所有tab按钮的active状态
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 显示选中的页面
            document.getElementById(tabName).classList.add('active');
            
            // 添加active状态到点击的按钮
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            
            // 滚动到顶部
            window.scrollTo(0, 0);
        }
        
        // 简单的Markdown转HTML
        function markdownToHtml(text) {
            let html = text;
            
            // 处理标题
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            
            // 处理列表
            html = html.replace(/^\- (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\n<ul>/g, '');
            
            // 处理粗体 **text**
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // 处理代码 `code`
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            
            return html;
        }
        
        async function loadContent() {
            try {
                const content = {
                    scripts: `## 《凡人修币录》S2 - 情绪之证明
- **创建日期:** 2026-03-19
- **状态:** 剧本设计中
- **形式:** 短剧
- **时长/集数:** 1~2分钟/集，共6集
- **世界观梗概:** 情绪收割与Builder精神的对抗
- **核心冲突:** 加密文化中的人性矛盾
- **其他备注:** 采用黑镜模式，每季对应当下最真实的加密议题`,
                    
                    characters: `## 《凡人修币录》S2

### 主要人物
- 待补充

### 人物关系图
- 待补充`,
                    
                    narrative: `## 《凡人修币录》S2

### 核心框架
**统一世界观主题：** 加密文化与人性
- S1：FUD与信仰
- S2：情绪收割与Builder精神
- S3：L1大Boss的真正面目
- Sn：每一季对应当下最真实的加密议题

### 创作思路
- 采用黑镜模式：统一世界观 + 每季独立故事 + 无限延伸潜力

### 与黑镜的对标分析
**黑镜：** 观众是被动消费者

**《凡人修币录》：** 观众可以成为共创者
- 共创者身份
- 贡献者身份
- 早期持有者身份
- 观众与IP的关系从"消费"变成"共建"

### 核心竞争力
为什么比黑镜更有潜力：观众的身份不是消费者，而是参与者和利益相关方`
                };
                
                document.getElementById('scriptsContent').innerHTML = markdownToHtml(content.scripts);
                document.getElementById('charactersContent').innerHTML = markdownToHtml(content.characters);
                document.getElementById('narrativeContent').innerHTML = markdownToHtml(content.narrative);
                
                const now = new Date();
                const timeStr = now.toLocaleString('zh-CN', { 
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                document.getElementById('lastUpdate').textContent = `最后更新: ${timeStr}`;
                
            } catch (error) {
                console.error('加载失败:', error);
            }
        }
        
        window.addEventListener('load', loadContent);
    </script>
</body>
</html>
